<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Incidencia - Operador</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../estilos/general.css">
    <link rel="stylesheet" href="../../estilos/operador.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-geo-alt-fill me-2"></i>
                Incidencias Caninas - Tarija
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard_operador.html">
                            <i class="bi bi-house-fill me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="listado_incidencias.html">
                            <i class="bi bi-list-ul me-1"></i>Incidencias
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="mapa_operativo.html">
                            <i class="bi bi-map me-1"></i>Mapa
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="mapa_calor_operativo.html">Mapa de Calor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard_estadistico.html">
                            <i class="bi bi-bar-chart-fill me-1"></i>Estadísticas
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                            data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>
                            <span id="nombreUsuario">Cargando...</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="perfil_operador.html"><i
                                        class="bi bi-person me-2"></i>Perfil</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="cerrarSesion()"><i
                                        class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">
                            <i class="bi bi-pencil-square me-2 text-warning"></i>
                            Gestionar Incidencia
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <div id="alertContainer"></div>

                        <!-- Información de la incidencia -->
                        <div class="alert alert-info" id="infoIncidencia">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6>Cargando información...</h6>
                                    <small class="text-muted">Espera un momento</small>
                                </div>
                            </div>
                        </div>

                        <form id="estadoForm">
                            <input type="hidden" id="incidenciaId">

                            <div class="mb-3">
                                <label for="id_estado" class="form-label fw-bold">
                                    <i class="bi bi-arrow-right-circle me-1"></i>Estado <span
                                        class="text-danger">*</span>
                                </label>
                                <select class="form-select" id="id_estado" required>
                                    <option value="">Selecciona un estado...</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="prioridad" class="form-label fw-bold">
                                    <i class="bi bi-exclamation-triangle me-1"></i>Prioridad
                                </label>
                                <select class="form-select" id="prioridad">
                                    <option value="baja">Baja</option>
                                    <option value="media" selected>Media</option>
                                    <option value="alta">Alta</option>
                                    <option value="critica">Crítica</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="observaciones" class="form-label fw-bold">
                                    <i class="bi bi-chat me-1"></i>Observaciones (opcional)
                                </label>
                                <textarea class="form-control" id="observaciones" rows="3"
                                    placeholder="Agrega notas internas sobre esta incidencia..."></textarea>
                            </div>

                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-success btn-lg" id="btnGuardar">
                                    <i class="bi bi-save me-2"></i>Guardar Cambios
                                </button>
                                <a href="detalle_incidencia.html" class="btn btn-outline-secondary btn-lg"
                                    id="btnCancelar">
                                    <i class="bi bi-x-circle me-2"></i>Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../scripts/api.js"></script>
    <script src="../../scripts/autenticacion.js"></script>
    <script src="../../scripts/operador.js"></script>
</body>

</html>
