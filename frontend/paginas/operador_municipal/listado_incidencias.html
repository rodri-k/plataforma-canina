<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Incidencias - Operador</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../estilos/general.css">
    <link rel="stylesheet" href="../../estilos/operador.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-geo-alt-fill me-2"></i>
                Incidencias Caninas - Tarija
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard_operador.html">
                            <i class="bi bi-house-fill me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="listado_incidencias.html">
                            <i class="bi bi-list-ul me-1"></i>Incidencias
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="mapa_operativo.html">
                            <i class="bi bi-map me-1"></i>Mapa
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="mapa_calor_operativo.html">Mapa de Calor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard_estadistico.html">
                            <i class="bi bi-bar-chart-fill me-1"></i>Estadísticas
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                            data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>
                            <span id="nombreUsuario">Cargando...</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="perfil_operador.html"><i
                                        class="bi bi-person me-2"></i>Perfil</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="cerrarSesion()"><i
                                        class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-12">
                <h2 class="mb-2">
                    <i class="bi bi-list-ul me-2 text-primary"></i>
                    Gestión de Incidencias
                </h2>
                <p class="text-muted" id="contadorIncidencias">Cargando...</p>
            </div>
        </div>

        <!-- Filtros -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="filtro-card">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-2">
                            <label class="form-label small">Estado</label>
                            <select class="form-select form-select-sm" id="filtroEstado">
                                <option value="">Todos</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small">Categoría</label>
                            <select class="form-select form-select-sm" id="filtroCategoria">
                                <option value="">Todas</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small">Barrio</label>
                            <select class="form-select form-select-sm" id="filtroBarrio">
                                <option value="">Todos</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small">Prioridad</label>
                            <select class="form-select form-select-sm" id="filtroPrioridad">
                                <option value="">Todas</option>
                                <option value="baja">Baja</option>
                                <option value="media">Media</option>
                                <option value="alta">Alta</option>
                                <option value="critica">Crítica</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <button class="btn btn-primary btn-sm" id="btnFiltrar">
                                <i class="bi bi-funnel me-1"></i>Filtrar
                            </button>
                            <button class="btn btn-outline-secondary btn-sm" id="btnLimpiarFiltros">
                                <i class="bi bi-eraser me-1"></i>Limpiar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Listado -->
        <div class="row">
            <div class="col-12">
                <div id="listaIncidencias">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                        <p class="mt-3 text-muted">Cargando incidencias...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../scripts/api.js"></script>
    <script src="../../scripts/autenticacion.js"></script>
    <script src="../../scripts/operador.js"></script>
</body>

</html>
