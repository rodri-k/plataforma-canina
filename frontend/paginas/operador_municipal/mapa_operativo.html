</head>

        <div class="container-fluid">
            <a class="navbar-brand" href="#">

                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">

                        <a class="nav-link" href="mapa_calor_operativo.html">Mapa de Calor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard_estadistico.html">Estadisticas</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"

                            <li><a class="dropdown-item" href="perfil_operador.html">Perfil</a></li>

                            </li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-12">
                <h2 class="mb-4">Mapa Operativo de Incidencias</h2>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6 class="mb-3">Filtros</h6>

                        <label class="form-label small">Estado</label>
                        <select class="form-select form-select-sm mb-2" id="filtroEstadoMapa">
                            <option value="">Todos</option>
                            <option value="1">Pendiente</option>
                            <option value="2">En revision</option>
                            <option value="3">En curso</option>
                            <option value="4">Cerrada</option>
                        </select>

                        <label class="form-label small">Categoria</label>
                        <select class="form-select form-select-sm mb-2" id="filtroCategoriaMapa">
                            <option value="">Todas</option>
                        </select>

                        <label class="form-label small">Prioridad</label>
                        <select class="form-select form-select-sm mb-2" id="filtroPrioridadMapa">
                            <option value="">Todas</option>
                            <option value="baja">Baja</option>
                            <option value="media">Media</option>
                            <option value="alta">Alta</option>
                            <option value="critica">Critica</option>
                        </select>

                        <button class="btn btn-primary btn-sm w-100 mt-2" id="btnAplicarFiltrosMapa">
                            Aplicar filtros
                        </button>
                        <button class="btn btn-outline-secondary btn-sm w-100 mt-1" id="btnLimpiarFiltrosMapa">
                            Limpiar filtros
                        </button>
                    </div>
                </div>

                <div class="card shadow-sm mt-3">
                    <div class="card-body">
                        <h6 class="mb-2">Leyenda</h6>
                        <div class="d-flex align-items-center mb-1">
                            <span class="badge"
                                style="background: #F1C40F; width: 20px; height: 20px; border-radius: 50%; display: inline-block;"></span>
                            <span class="ms-2 small">Pendiente</span>
                        </div>
                        <div class="d-flex align-items-center mb-1">
                            <span class="badge"
                                style="background: #3498DB; width: 20px; height: 20px; border-radius: 50%; display: inline-block;"></span>
                            <span class="ms-2 small">En revision</span>
                        </div>
                        <div class="d-flex align-items-center mb-1">
                            <span class="badge"
                                style="background: #E67E22; width: 20px; height: 20px; border-radius: 50%; display: inline-block;"></span>
                            <span class="ms-2 small">En curso</span>
                        </div>
                        <div class="d-flex align-items-center">
                            <span class="badge"
                                style="background: #2ECC71; width: 20px; height: 20px; border-radius: 50%; display: inline-block;"></span>
                            <span class="ms-2 small">Cerrada</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div id="mapaOperativo" style="height: 600px; border-radius: 0.5rem;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../../scripts/api.js"></script>
    <script src="../../scripts/autenticacion.js"></script>
    <script src="../../scripts/operador.js"></script>
</body>

</html>
