<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Accion Municipal - Operador</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../estilos/general.css">
    <link rel="stylesheet" href="../../estilos/operador.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                Incidencias Caninas - Tarija
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard_operador.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="listado_incidencias.html">Incidencias</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="mapa_operativo.html">Mapa</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="mapa_calor_operativo.html">Mapa de Calor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard_estadistico.html">Estadisticas</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                            data-bs-toggle="dropdown">
                            <span id="nombreUsuario">Cargando...</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="perfil_operador.html">Perfil</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="cerrarSesion()">Cerrar Sesion</a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Registrar Accion Municipal</h5>
                    </div>
                    <div class="card-body p-4">
                        <div id="alertContainer"></div>

                        <div id="infoIncidencia" class="alert alert-info">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6>Cargando informacion de la incidencia...</h6>
                                    <small class="text-muted">Espera un momento</small>
                                </div>
                            </div>
                        </div>

                        <form id="accionForm" enctype="multipart/form-data">
                            <input type="hidden" id="incidenciaId">

                            <div class="mb-3">
                                <label for="tipo_accion" class="form-label fw-bold">Tipo de Accion</label>
                                <select class="form-select" id="tipo_accion" required>
                                    <option value="">Selecciona un tipo...</option>
                                    <option value="vacunacion">Vacunacion</option>
                                    <option value="esterilizacion">Esterilizacion</option>
                                    <option value="rescate">Rescate</option>
                                    <option value="atencion_veterinaria">Atencion Veterinaria</option>
                                    <option value="reubicacion">Reubicacion</option>
                                    <option value="alimentacion">Alimentacion</option>
                                    <option value="seguimiento">Seguimiento</option>
                                    <option value="derivacion">Derivacion</option>
                                    <option value="otro">Otro</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="descripcion" class="form-label fw-bold">Descripcion</label>
                                <textarea class="form-control" id="descripcion" rows="3"
                                    placeholder="Describe la accion realizada..." required></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="evidencia" class="form-label fw-bold">Evidencia (opcional)</label>
                                <input type="file" class="form-control" id="evidencia" accept="image/*">
                                <div id="previewEvidencia" class="mt-2" style="display: none;">
                                    <img id="previewImg" class="img-fluid rounded" style="max-height: 200px;">
                                </div>
                            </div>

                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-success btn-lg" id="btnGuardar">
                                    Registrar Accion
                                </button>
                                <a href="detalle_incidencia.html" class="btn btn-outline-secondary btn-lg"
                                    id="btnCancelar">
                                    Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../scripts/api.js"></script>
    <script src="../../scripts/autenticacion.js"></script>
    <script src="../../scripts/operador.js"></script>
</body>

</html>
