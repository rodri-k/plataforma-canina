<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Incidencias Caninas</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="../../estilos/general.css">
    <link rel="stylesheet" href="../../estilos/autenticacion.css">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <!-- Logo / Título -->
                        <div class="text-center mb-4">
                            <div class="auth-icon mb-3">
                                <i class="bi bi-box-arrow-in-right-fill text-primary" style="font-size: 3rem;"></i>
                            </div>
                            <h4 class="fw-bold">Bienvenido</h4>
                            <p class="text-muted small">Ingresa a tu cuenta</p>
                        </div>

                        <!-- Formulario de login -->
                        <form id="loginForm">
                            <div id="alertContainer"></div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="correo@ejemplo.com"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" placeholder="Tu contraseña"
                                    required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg" id="btnLogin">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                            </button>
                        </form>

                        <!-- Enlaces -->
                        <div class="text-center mt-4">
                            <p class="mb-0">
                                ¿No tienes cuenta?
                                <a href="registrarse.html" class="text-primary fw-bold">Regístrate aquí</a>
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="text-center mt-3">
                    <a href="../../index.html" class="text-decoration-none text-muted small">
                        <i class="bi bi-arrow-left me-1"></i>Volver al inicio
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Scripts de autenticación -->
    <script src="../../scripts/api.js"></script>
    <script src="../../scripts/autenticacion.js"></script>
</body>

</html>
