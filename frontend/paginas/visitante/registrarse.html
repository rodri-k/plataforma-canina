<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Incidencias Caninas</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="../../estilos/general.css">
    <link rel="stylesheet" href="../../estilos/autenticacion.css">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <!-- Logo / Título -->
                        <div class="text-center mb-4">
                            <div class="auth-icon mb-3">
                                <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
                            </div>
                            <h4 class="fw-bold">Crear Cuenta</h4>
                            <p class="text-muted small">Regístrate para reportar incidencias</p>
                        </div>

                        <!-- Formulario de registro -->
                        <form id="registroForm">
                            <div id="alertContainer"></div>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="nombre" class="form-label">Nombre</label>
                                    <input type="text" class="form-control" id="nombre" placeholder="Tu nombre"
                                        required>
                                </div>
                                <div class="col-md-6">
                                    <label for="apellido" class="form-label">Apellido</label>
                                    <input type="text" class="form-control" id="apellido" placeholder="Tu apellido"
                                        required>
                                </div>
                            </div>

                            <div class="mb-3 mt-3">
                                <label for="email" class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="correo@ejemplo.com"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label for="telefono" class="form-label">Teléfono (opcional)</label>
                                <input type="tel" class="form-control" id="telefono" placeholder="74642456">
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password"
                                    placeholder="Mínimo 6 caracteres" required>
                                <small class="text-muted">La contraseña debe tener al menos 6 caracteres</small>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg" id="btnRegistrar">
                                <i class="bi bi-person-plus me-2"></i>Registrarse
                            </button>
                        </form>

                        <!-- Enlace a inicio de sesión -->
                        <div class="text-center mt-4">
                            <p class="mb-0">
                                ¿Ya tienes cuenta?
                                <a href="iniciar_sesion.html" class="text-primary fw-bold">Iniciar Sesión</a>
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="text-center mt-3">
                    <a href="../../index.html" class="text-decoration-none text-muted small">
                        <i class="bi bi-arrow-left me-1"></i>Volver al inicio
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Scripts de autenticación -->
    <script src="../../scripts/api.js"></script>
    <script src="../../scripts/autenticacion.js"></script>
</body>

</html>
